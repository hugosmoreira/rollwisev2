<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RollWise — the marketplace for private Jiu-Jitsu coaching. Find verified BJJ coaches, book private or small-group sessions, and train with purpose."
    />
    <meta name="theme-color" content="#0A0A0B" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>RollWise — Private Jiu-Jitsu Coaching, On Demand</title>

    <!--
      Apply the saved theme before first paint to avoid a flash.
      This stores a single UI preference string only — it is NOT an
      application data store (see project hard rules: no localStorage database).
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('rollwise-theme');
          var theme = saved === 'light' || saved === 'dark' ? saved : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
